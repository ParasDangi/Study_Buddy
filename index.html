<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Study Buddy</title>
    <link rel="stylesheet" href="public/style.css">
  </head>
  <body>
    <main class="container">
      <h1>Study Buddy</h1>

      <div class="controls">
        <button id="startBtn">Start Recording</button>
        <button id="stopBtn" disabled>Stop</button>
        <label><input type="checkbox" id="speakResponse" checked> Speak responses</label>
      </div>

      <div class="io">
        <textarea id="transcript" placeholder="Your speech will appear here..." rows="4"></textarea>
        <div class="actions">
          <input id="textInput" placeholder="Or type a question and press Send" />
          <button id="sendBtn">Send</button>
        </div>
      </div>

      <section class="response">
        <h2>Conversation</h2>
        <div id="history" class="history">(no conversation yet)</div>
        <h3>Latest response</h3>
        <div id="replyArea" class="reply">(responses appear here)</div>
      </section>

      <footer>For study purposes only — do not use for medical, legal, or sensitive advice.</footer>
    </main>

    <script src="public/app.js"></script>
  </body>
